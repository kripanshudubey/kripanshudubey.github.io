name: CI-CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: CI - Build & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Validate index.html exists
        run: |
          echo "Checking index.html..."
          test -f index.html

      - name: Build Success
        run: echo "CI Passed ✅"

  deploy:
    name: CD - Deploy to GitHub Pages
    needs: build   # 🔥 THIS IS THE KEY
    runs-on: ubuntu-latest
    environment:
      name: github-pages

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        uses: actions/deploy-pages@v4